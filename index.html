<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>scoliosisNET 标注工具</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
        background: #eef2f5;
        color: #18232f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      .shell {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 420px;
        min-height: 100vh;
      }

      .workspace {
        display: flex;
        flex-direction: column;
        min-width: 0;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        padding: 16px 20px;
        border-bottom: 1px solid #cad3dd;
        background: #ffffff;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: 20px;
        line-height: 1.25;
      }

      .topbar p {
        margin-top: 4px;
        color: #667383;
        font-size: 13px;
      }

      .actions,
      .buttonGrid,
      .zoomControls {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      button,
      .fileButton {
        min-height: 36px;
        border: 1px solid #bec9d4;
        border-radius: 6px;
        background: #ffffff;
        color: #18232f;
        padding: 0 12px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        white-space: nowrap;
      }

      button:hover,
      .fileButton:hover {
        border-color: #51687f;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.45;
      }

      input[type="file"] {
        display: none;
      }

      .canvasWrap {
        flex: 1;
        display: grid;
        place-items: center;
        padding: 18px;
        overflow: auto;
        background: #dfe5eb;
      }

      canvas {
        width: min(74vw, 980px);
        aspect-ratio: 11 / 14;
        height: auto;
        border: 1px solid #aebac7;
        background: #10161c;
        box-shadow: 0 12px 28px rgba(18, 31, 45, 0.18);
        cursor: crosshair;
      }

      .panel {
        padding: 18px;
        background: #ffffff;
        border-left: 1px solid #cad3dd;
        overflow-y: auto;
      }

      .section {
        padding: 15px 0;
        border-bottom: 1px solid #e1e7ed;
      }

      .section:first-child {
        padding-top: 0;
      }

      h2 {
        font-size: 15px;
        margin-bottom: 10px;
      }

      .field {
        display: grid;
        gap: 6px;
        margin-bottom: 10px;
        font-size: 13px;
      }

      .field input,
      .field select,
      textarea {
        width: 100%;
        min-height: 36px;
        border: 1px solid #c8d1db;
        border-radius: 6px;
        padding: 7px 9px;
        background: #ffffff;
      }

      textarea {
        min-height: 250px;
        resize: vertical;
        font-family: Consolas, "Courier New", monospace;
        font-size: 12px;
        line-height: 1.45;
      }

      .buttonGrid {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }

      .buttonGrid button {
        width: 100%;
      }

      .row {
        display: grid;
        grid-template-columns: minmax(120px, 1fr) auto;
        gap: 10px;
        align-items: center;
        padding: 8px 10px;
        margin-bottom: 7px;
        border: 1px solid #e0e7ee;
        border-radius: 6px;
        background: #f7f9fb;
        font-size: 13px;
      }

      .row strong {
        font-weight: 650;
      }

      .value {
        color: #0f5132;
        font-weight: 700;
        text-align: right;
      }

      .warning {
        color: #8a4b08;
      }

      .pointList {
        display: grid;
        gap: 7px;
        max-height: 390px;
        overflow: auto;
        padding-right: 2px;
      }

      .pointItem {
        display: grid;
        grid-template-columns: 22px minmax(0, 1fr) auto;
        gap: 8px;
        align-items: center;
        padding: 8px;
        border: 1px solid #e0e7ee;
        border-radius: 6px;
        background: #f8fafc;
        font-size: 13px;
      }

      .dot {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #b5c0ca;
      }

      .pointItem.active .dot {
        background: #e69f00;
      }

      .pointItem.done .dot {
        background: #2fbf71;
      }

      .hint {
        color: #667383;
        font-size: 12px;
        line-height: 1.55;
        margin-top: 8px;
      }

      .zoomControls {
        margin-top: 10px;
      }

      .zoomControls button {
        min-width: 42px;
        padding: 0 9px;
      }

      @media (max-width: 980px) {
        .shell {
          grid-template-columns: 1fr;
        }

        .panel {
          border-left: 0;
          border-top: 1px solid #cad3dd;
        }

        canvas {
          width: min(96vw, 980px);
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="workspace">
        <header class="topbar">
          <div>
            <h1>scoliosisNET 标注工具</h1>
            <p>科研/demo 标注辅助。当前模型仍训练主 Cobb 四点；完整模式用于逐步积累多参数标注。</p>
          </div>
          <div class="actions">
            <label class="fileButton">
              打开 X 线片
              <input id="imageInput" type="file" accept="image/png,image/jpeg,image/bmp,image/webp" />
            </label>
            <label class="fileButton">
              导入 JSON
              <input id="jsonInput" type="file" accept="application/json,.json" />
            </label>
          </div>
        </header>
        <div class="canvasWrap">
          <canvas id="canvas" width="1100" height="1400"></canvas>
        </div>
      </section>

      <aside class="panel">
        <section class="section">
          <h2>当前图像</h2>
          <div id="imageInfo"></div>
          <div class="field">
            <label for="modeInput">标注模式</label>
            <select id="modeInput">
              <option value="basic">基础模式：主 Cobb 四点</option>
              <option value="full">完整模式：多参数 v2</option>
            </select>
          </div>
          <p class="hint">坐标使用原图像素坐标，不是页面缩放后的坐标。完整模式不会改变当前训练脚本，当前 YOLO pose 仍只读取主 Cobb 四点。</p>
        </section>

        <section class="section">
          <h2>点击顺序</h2>
          <div id="pointList" class="pointList"></div>
          <div class="buttonGrid" style="margin-top: 10px">
            <button id="undoButton" type="button">撤销上一点</button>
            <button id="resetButton" type="button">清空当前模式点</button>
          </div>
          <div class="zoomControls">
            <button id="zoomOutButton" type="button">-</button>
            <button id="zoomInButton" type="button">+</button>
            <button id="fitButton" type="button">适应</button>
            <button id="actualSizeButton" type="button">100%</button>
          </div>
          <p class="hint">滚轮缩放；拖动空白处平移；拖动黄色点微调。完整模式里不确定的点可以暂时不标。</p>
        </section>

        <section class="section">
          <h2>补充信息</h2>
          <div class="field">
            <label for="gtInput">医生 Cobb 角参考值，可留空</label>
            <input id="gtInput" type="number" step="0.1" placeholder="例如 42.5" />
          </div>
          <div class="field">
            <label for="upperInput">上端椎，可留空</label>
            <input id="upperInput" type="text" placeholder="例如 T6" />
          </div>
          <div class="field">
            <label for="lowerInput">下端椎，可留空</label>
            <input id="lowerInput" type="text" placeholder="例如 L1" />
          </div>
          <div class="field">
            <label for="apexInput">顶椎，可留空</label>
            <input id="apexInput" type="text" placeholder="例如 T9" />
          </div>
        </section>

        <section class="section">
          <h2>测量预览</h2>
          <div id="metrics"></div>
        </section>

        <section class="section">
          <h2>JSON 输出</h2>
          <textarea id="jsonOutput" spellcheck="false" readonly></textarea>
          <div class="buttonGrid" style="margin-top: 10px">
            <button id="copyButton" type="button">复制 JSON</button>
            <button id="downloadButton" type="button">下载 JSON</button>
          </div>
          <p class="hint">文件名会跟图片同名，例如 case001.jpg 对应 case001.json。v2 JSON 仍包含旧版 points 四点字段，可继续用于当前训练转换。</p>
        </section>
      </aside>
    </main>

    <script>
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");
      const imageInput = document.getElementById("imageInput");
      const jsonInput = document.getElementById("jsonInput");
      const imageInfo = document.getElementById("imageInfo");
      const pointList = document.getElementById("pointList");
      const metrics = document.getElementById("metrics");
      const jsonOutput = document.getElementById("jsonOutput");
      const undoButton = document.getElementById("undoButton");
      const resetButton = document.getElementById("resetButton");
      const zoomOutButton = document.getElementById("zoomOutButton");
      const zoomInButton = document.getElementById("zoomInButton");
      const fitButton = document.getElementById("fitButton");
      const actualSizeButton = document.getElementById("actualSizeButton");
      const copyButton = document.getElementById("copyButton");
      const downloadButton = document.getElementById("downloadButton");
      const gtInput = document.getElementById("gtInput");
      const upperInput = document.getElementById("upperInput");
      const lowerInput = document.getElementById("lowerInput");
      const apexInput = document.getElementById("apexInput");
      const modeInput = document.getElementById("modeInput");

      const pointCatalog = {
        upper_left: { label: "上端椎上终板左点", group: "main_cobb", required: true },
        upper_right: { label: "上端椎上终板右点", group: "main_cobb", required: true },
        lower_left: { label: "下端椎下终板左点", group: "main_cobb", required: true },
        lower_right: { label: "下端椎下终板右点", group: "main_cobb", required: true },
        t1_upper_left: { label: "T1 上终板左点", group: "t1_tilt" },
        t1_upper_right: { label: "T1 上终板右点", group: "t1_tilt" },
        c7_center: { label: "C7 中点", group: "global_alignment" },
        sacrum_center: { label: "骶骨中点 / CSVL 参考点", group: "global_alignment" },
        apex_center: { label: "主弯顶椎中心", group: "global_alignment" },
        left_shoulder: { label: "左肩参考点", group: "shoulder" },
        right_shoulder: { label: "右肩参考点", group: "shoulder" },
        left_clavicle: { label: "左锁骨参考点", group: "shoulder" },
        right_clavicle: { label: "右锁骨参考点", group: "shoulder" },
        left_pelvis: { label: "左骨盆参考点", group: "pelvis" },
        right_pelvis: { label: "右骨盆参考点", group: "pelvis" },
      };

      const basicPointNames = ["upper_left", "upper_right", "lower_left", "lower_right"];
      const fullPointNames = [
        ...basicPointNames,
        "t1_upper_left",
        "t1_upper_right",
        "c7_center",
        "sacrum_center",
        "apex_center",
        "left_shoulder",
        "right_shoulder",
        "left_clavicle",
        "right_clavicle",
        "left_pelvis",
        "right_pelvis",
      ];

      const state = {
        image: null,
        imageName: "",
        imageWidth: 0,
        imageHeight: 0,
        fitScale: 1,
        view: { scale: 1, offsetX: 0, offsetY: 0 },
        transform: { x: 0, y: 0, width: canvas.width, height: canvas.height, scale: 1 },
        mode: "basic",
        points: {},
        activePointName: null,
        isPanning: false,
        panStart: null,
        importedJsonName: "",
      };

      function currentPointNames() {
        return state.mode === "full" ? fullPointNames : basicPointNames;
      }

      function row(label, value, className = "") {
        return `<div class="row"><strong>${escapeHtml(label)}</strong><span class="value ${className}">${escapeHtml(value)}</span></div>`;
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function nextPointName() {
        return currentPointNames().find((name) => !state.points[name]) || null;
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#10161c";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (!state.image) {
          ctx.fillStyle = "#d8e0e8";
          ctx.font = "18px Segoe UI, Microsoft YaHei, sans-serif";
          ctx.textAlign = "center";
          ctx.fillText("打开一张脊柱全长正位 X 线片后开始标注", canvas.width / 2, canvas.height / 2);
          return;
        }

        if (!state.fitScale) resetView();
        const ratio = state.fitScale * state.view.scale;
        const width = state.image.width * ratio;
        const height = state.image.height * ratio;
        const x = (canvas.width - width) / 2 + state.view.offsetX;
        const y = (canvas.height - height) / 2 + state.view.offsetY;
        state.transform = { x, y, width, height, scale: ratio };
        ctx.drawImage(state.image, x, y, width, height);

        drawLine("upper_left", "upper_right", "#2fbf71");
        drawLine("lower_left", "lower_right", "#4b8cff");
        drawLine("t1_upper_left", "t1_upper_right", "#d16666");
        drawLine("left_shoulder", "right_shoulder", "#9b6bd3");
        drawLine("left_clavicle", "right_clavicle", "#6d8edb");
        drawLine("left_pelvis", "right_pelvis", "#d19a2a");
        drawVerticalGuide("c7_center", "#2fbf71");
        drawVerticalGuide("sacrum_center", "#4b8cff");

        currentPointNames().forEach((name, index) => drawPoint(name, index + 1));
      }

      function drawLine(aName, bName, color) {
        const a = state.points[aName];
        const b = state.points[bName];
        if (!a || !b) return;
        const ac = imageToCanvas(a);
        const bc = imageToCanvas(b);
        ctx.save();
        ctx.strokeStyle = color;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(ac.x, ac.y);
        ctx.lineTo(bc.x, bc.y);
        ctx.stroke();
        ctx.restore();
      }

      function drawVerticalGuide(name, color) {
        const point = state.points[name];
        if (!point) return;
        const canvasPoint = imageToCanvas(point);
        ctx.save();
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.setLineDash([8, 8]);
        ctx.beginPath();
        ctx.moveTo(canvasPoint.x, 20);
        ctx.lineTo(canvasPoint.x, canvas.height - 20);
        ctx.stroke();
        ctx.restore();
      }

      function drawPoint(name, number) {
        const point = state.points[name];
        if (!point) return;
        const def = pointCatalog[name];
        const canvasPoint = imageToCanvas(point);
        ctx.save();
        ctx.fillStyle = "#f5c542";
        ctx.strokeStyle = "#102030";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(canvasPoint.x, canvasPoint.y, 7, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "#ffffff";
        ctx.font = "12px Segoe UI, Microsoft YaHei, sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(String(number), canvasPoint.x, canvasPoint.y);
        drawTag(def.label, canvasPoint.x + 12, canvasPoint.y - 8);
        ctx.restore();
      }

      function drawTag(text, x, y) {
        ctx.save();
        ctx.font = "12px Segoe UI, Microsoft YaHei, sans-serif";
        const width = ctx.measureText(text).width + 10;
        const safeX = Math.max(4, Math.min(canvas.width - width - 4, x));
        const safeY = Math.max(22, Math.min(canvas.height - 4, y));
        ctx.fillStyle = "rgba(14, 20, 26, 0.78)";
        ctx.fillRect(safeX, safeY - 18, width, 20);
        ctx.fillStyle = "#ffffff";
        ctx.textAlign = "left";
        ctx.textBaseline = "alphabetic";
        ctx.fillText(text, safeX + 5, safeY - 5);
        ctx.restore();
      }

      function imageToCanvas(point) {
        return {
          x: state.transform.x + point[0] * state.transform.scale,
          y: state.transform.y + point[1] * state.transform.scale,
        };
      }

      function canvasToImage(x, y) {
        return [
          Math.round((x - state.transform.x) / state.transform.scale),
          Math.round((y - state.transform.y) / state.transform.scale),
        ];
      }

      function eventToCanvasPoint(event) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        return {
          x: (event.clientX - rect.left) * scaleX,
          y: (event.clientY - rect.top) * scaleY,
        };
      }

      function resetView() {
        if (!state.image) return;
        state.fitScale = Math.min(canvas.width / state.image.width, canvas.height / state.image.height);
        state.view = { scale: 1, offsetX: 0, offsetY: 0 };
        state.transform = {
          x: (canvas.width - state.image.width * state.fitScale) / 2,
          y: (canvas.height - state.image.height * state.fitScale) / 2,
          width: state.image.width * state.fitScale,
          height: state.image.height * state.fitScale,
          scale: state.fitScale,
        };
      }

      function setZoom(nextScale, anchor = { x: canvas.width / 2, y: canvas.height / 2 }) {
        if (!state.image) return;
        const previousImagePoint = canvasToImage(anchor.x, anchor.y);
        state.view.scale = Math.max(0.25, Math.min(8, nextScale));
        const ratio = state.fitScale * state.view.scale;
        const centeredX = (canvas.width - state.image.width * ratio) / 2;
        const centeredY = (canvas.height - state.image.height * ratio) / 2;
        state.view.offsetX = anchor.x - centeredX - previousImagePoint[0] * ratio;
        state.view.offsetY = anchor.y - centeredY - previousImagePoint[1] * ratio;
        render();
      }

      function setImagePoint(name, canvasX, canvasY) {
        if (!state.image || !isInsideImage(canvasX, canvasY)) return;
        const point = canvasToImage(canvasX, canvasY);
        point[0] = Math.max(0, Math.min(state.imageWidth - 1, point[0]));
        point[1] = Math.max(0, Math.min(state.imageHeight - 1, point[1]));
        state.points[name] = point;
      }

      function hitTestPoint(canvasX, canvasY) {
        let best = null;
        currentPointNames().forEach((name) => {
          const point = state.points[name];
          if (!point) return;
          const canvasPoint = imageToCanvas(point);
          const distance = Math.hypot(canvasPoint.x - canvasX, canvasPoint.y - canvasY);
          if (distance <= 14 && (!best || distance < best.distance)) {
            best = { name, distance };
          }
        });
        return best?.name || null;
      }

      function isInsideImage(x, y) {
        return (
          x >= state.transform.x &&
          x <= state.transform.x + state.transform.width &&
          y >= state.transform.y &&
          y <= state.transform.y + state.transform.height
        );
      }

      function calculateLineAngle(a, b) {
        return (Math.atan2(b[1] - a[1], b[0] - a[0]) * 180) / Math.PI;
      }

      function calculateAngleBetween(a1, a2, b1, b2) {
        let raw = Math.abs(calculateLineAngle(a1, a2) - calculateLineAngle(b1, b2)) % 180;
        if (raw > 90) raw = 180 - raw;
        return raw;
      }

      function calculateCobb() {
        const p = state.points;
        if (!p.upper_left || !p.upper_right || !p.lower_left || !p.lower_right) return null;
        const upper = calculateLineAngle(p.upper_left, p.upper_right);
        const lower = calculateLineAngle(p.lower_left, p.lower_right);
        return { cobb: calculateAngleBetween(p.upper_left, p.upper_right, p.lower_left, p.lower_right), upper, lower };
      }

      function optionalLineMetric(leftName, rightName) {
        const left = state.points[leftName];
        const right = state.points[rightName];
        if (!left || !right) return null;
        return calculateLineAngle(left, right);
      }

      function optionalHorizontalDistance(aName, bName) {
        const a = state.points[aName];
        const b = state.points[bName];
        if (!a || !b) return null;
        return a[0] - b[0];
      }

      function legacyMainPoints() {
        const points = {};
        basicPointNames.forEach((name) => {
          if (state.points[name]) points[name] = state.points[name];
        });
        return points;
      }

      function groupPoints(group) {
        const points = {};
        Object.entries(pointCatalog).forEach(([name, def]) => {
          if (def.group === group && state.points[name]) {
            points[name] = state.points[name];
          }
        });
        return points;
      }

      function buildJson() {
        if (!state.image) return null;
        const cobb = calculateCobb();
        const mainPoints = legacyMainPoints();
        const payload = {
          schema_version: "scoliosisnet_annotation_v2",
          image: state.imageName,
          image_width: state.imageWidth,
          image_height: state.imageHeight,
          annotation_mode: state.mode,
          points: mainPoints,
          cobb_angle_gt: gtInput.value === "" ? (cobb ? Number(cobb.cobb.toFixed(2)) : null) : Number(gtInput.value),
          upper_end_vertebra: upperInput.value.trim() || "",
          lower_end_vertebra: lowerInput.value.trim() || "",
          annotations: {
            main_cobb: {
              points: mainPoints,
              cobb_angle_gt: gtInput.value === "" ? (cobb ? Number(cobb.cobb.toFixed(2)) : null) : Number(gtInput.value),
              upper_end_vertebra: upperInput.value.trim() || "",
              lower_end_vertebra: lowerInput.value.trim() || "",
            },
          },
          metadata: {
            research_demo_only: true,
            contains_patient_identifier: false,
          },
        };

        if (state.mode === "full") {
          payload.annotations.t1_tilt = { points: groupPoints("t1_tilt"), angle_gt: optionalLineMetric("t1_upper_left", "t1_upper_right") };
          payload.annotations.global_alignment = {
            points: groupPoints("global_alignment"),
            c7_pl_to_csvl_px: optionalHorizontalDistance("c7_center", "sacrum_center"),
            apical_translation_px: optionalHorizontalDistance("apex_center", "sacrum_center"),
            apex_vertebra: apexInput.value.trim() || "",
          };
          payload.annotations.shoulder_pelvis = {
            points: {
              ...groupPoints("shoulder"),
              ...groupPoints("pelvis"),
            },
            shoulder_height_px: state.points.left_shoulder && state.points.right_shoulder ? state.points.left_shoulder[1] - state.points.right_shoulder[1] : null,
            clavicle_angle_gt: optionalLineMetric("left_clavicle", "right_clavicle"),
            pelvic_obliquity_gt: optionalLineMetric("left_pelvis", "right_pelvis"),
          };
          payload.annotations.vertebrae = [];
          payload.notes = [
            "v2 完整参数标注可逐步补齐。当前 scoliosisNET v1 训练仍只读取 annotations.main_cobb.points 或顶层 points 四点。",
            "若后续训练全椎体/多曲线模型，可在 annotations.vertebrae 中追加每个椎体四角点。",
          ];
        }
        return payload;
      }

      function render() {
        draw();
        const names = currentPointNames();
        const completed = names.filter((name) => state.points[name]).length;
        const requiredCompleted = basicPointNames.filter((name) => state.points[name]).length;
        const next = nextPointName();
        imageInfo.innerHTML = [
          row("文件名", state.imageName || "未打开"),
          row("图像尺寸", state.image ? `${state.imageWidth} x ${state.imageHeight}` : "未读取"),
          row("标注模式", state.mode === "full" ? "完整参数 v2" : "基础4点"),
          row("导入 JSON", state.importedJsonName || "无"),
          row("主 Cobb 四点", `${requiredCompleted} / ${basicPointNames.length}`, requiredCompleted === basicPointNames.length ? "" : "warning"),
          row("当前模式进度", `${completed} / ${names.length}`, completed === names.length ? "" : "warning"),
          row("下一点", next ? pointCatalog[next].label : "当前模式已完成"),
        ].join("");

        pointList.innerHTML = names
          .map((name, index) => {
            const def = pointCatalog[name];
            const point = state.points[name];
            const className = point ? "done" : name === next ? "active" : "";
            const required = def.required ? " *" : "";
            const value = point ? `[${point[0]}, ${point[1]}]` : "待点击";
            return `<div class="pointItem ${className}"><span class="dot"></span><strong>${index + 1}. ${escapeHtml(def.label + required)}</strong><span>${escapeHtml(value)}</span></div>`;
          })
          .join("");

        const cobb = calculateCobb();
        const t1 = optionalLineMetric("t1_upper_left", "t1_upper_right");
        const c7Offset = optionalHorizontalDistance("c7_center", "sacrum_center");
        const apexOffset = optionalHorizontalDistance("apex_center", "sacrum_center");
        const rows = cobb
          ? [
              row("Cobb 角预览", `${cobb.cobb.toFixed(2)} deg`),
              row("上终板角", `${cobb.upper.toFixed(2)} deg`),
              row("下终板角", `${cobb.lower.toFixed(2)} deg`),
            ]
          : [row("Cobb 角预览", "四个主 Cobb 点完成后显示", "warning")];
        if (state.mode === "full") {
          rows.push(row("T1 倾斜角", t1 === null ? "未标注" : `${t1.toFixed(2)} deg`, t1 === null ? "warning" : ""));
          rows.push(row("C7PL-CSVL", c7Offset === null ? "未标注" : `${c7Offset.toFixed(1)} px`, c7Offset === null ? "warning" : ""));
          rows.push(row("顶椎偏距", apexOffset === null ? "未标注" : `${apexOffset.toFixed(1)} px`, apexOffset === null ? "warning" : ""));
        }
        metrics.innerHTML = rows.join("");

        const payload = buildJson();
        jsonOutput.value = payload ? JSON.stringify(payload, null, 2) : "";
        undoButton.disabled = completed === 0;
        resetButton.disabled = completed === 0;
        copyButton.disabled = !payload || requiredCompleted !== basicPointNames.length;
        downloadButton.disabled = !payload || requiredCompleted !== basicPointNames.length;
      }

      imageInput.addEventListener("change", async (event) => {
        const [file] = event.target.files;
        if (!file) return;
        const dataUrl = await readFileAsDataUrl(file);
        const image = await loadImage(dataUrl);
        state.image = image;
        state.imageName = file.name;
        state.imageWidth = image.naturalWidth;
        state.imageHeight = image.naturalHeight;
        state.points = {};
        state.activePointName = null;
        state.isPanning = false;
        state.importedJsonName = "";
        resetView();
        gtInput.value = "";
        upperInput.value = "";
        lowerInput.value = "";
        apexInput.value = "";
        render();
      });

      jsonInput.addEventListener("change", async (event) => {
        const [file] = event.target.files;
        if (!file) return;
        const data = JSON.parse(await file.text());
        state.importedJsonName = file.name;
        if (data.annotation_mode === "full") {
          state.mode = "full";
          modeInput.value = "full";
        }
        if (data.image) state.imageName = data.image;
        if (data.image_width) state.imageWidth = Number(data.image_width);
        if (data.image_height) state.imageHeight = Number(data.image_height);
        state.points = {};
        const mergedPoints = {
          ...(data.points || {}),
          ...(data.annotations?.main_cobb?.points || {}),
          ...(data.annotations?.t1_tilt?.points || {}),
          ...(data.annotations?.global_alignment?.points || {}),
          ...(data.annotations?.shoulder_pelvis?.points || {}),
        };
        Object.keys(pointCatalog).forEach((name) => {
          if (Array.isArray(mergedPoints[name])) {
            state.points[name] = [Number(mergedPoints[name][0]), Number(mergedPoints[name][1])];
          }
        });
        gtInput.value = data.annotations?.main_cobb?.cobb_angle_gt ?? data.cobb_angle_gt ?? "";
        upperInput.value = data.annotations?.main_cobb?.upper_end_vertebra ?? data.upper_end_vertebra ?? "";
        lowerInput.value = data.annotations?.main_cobb?.lower_end_vertebra ?? data.lower_end_vertebra ?? "";
        apexInput.value = data.annotations?.global_alignment?.apex_vertebra ?? "";
        render();
      });

      modeInput.addEventListener("change", () => {
        state.mode = modeInput.value;
        render();
      });

      canvas.addEventListener("pointerdown", (event) => {
        if (!state.image) return;
        const canvasPoint = eventToCanvasPoint(event);
        const hit = hitTestPoint(canvasPoint.x, canvasPoint.y);
        const next = nextPointName();
        const targetName = hit || next;
        if (targetName && (hit || isInsideImage(canvasPoint.x, canvasPoint.y))) {
          setImagePoint(targetName, canvasPoint.x, canvasPoint.y);
          state.activePointName = targetName;
        } else {
          state.isPanning = true;
          state.panStart = { x: canvasPoint.x, y: canvasPoint.y, offsetX: state.view.offsetX, offsetY: state.view.offsetY };
        }
        canvas.setPointerCapture(event.pointerId);
        render();
      });

      canvas.addEventListener("pointermove", (event) => {
        const canvasPoint = eventToCanvasPoint(event);
        if (state.activePointName) {
          setImagePoint(state.activePointName, canvasPoint.x, canvasPoint.y);
          render();
          return;
        }
        if (state.isPanning && state.panStart) {
          state.view.offsetX = state.panStart.offsetX + canvasPoint.x - state.panStart.x;
          state.view.offsetY = state.panStart.offsetY + canvasPoint.y - state.panStart.y;
          render();
        }
      });

      canvas.addEventListener("pointerup", () => {
        state.activePointName = null;
        state.isPanning = false;
        state.panStart = null;
      });

      canvas.addEventListener("pointercancel", () => {
        state.activePointName = null;
        state.isPanning = false;
        state.panStart = null;
      });

      canvas.addEventListener("wheel", (event) => {
        if (!state.image) return;
        event.preventDefault();
        const anchor = eventToCanvasPoint(event);
        const factor = event.deltaY < 0 ? 1.15 : 1 / 1.15;
        setZoom(state.view.scale * factor, anchor);
      }, { passive: false });

      undoButton.addEventListener("click", () => {
        const names = currentPointNames();
        for (let index = names.length - 1; index >= 0; index -= 1) {
          const name = names[index];
          if (state.points[name]) {
            delete state.points[name];
            break;
          }
        }
        render();
      });

      resetButton.addEventListener("click", () => {
        currentPointNames().forEach((name) => delete state.points[name]);
        render();
      });

      zoomOutButton.addEventListener("click", () => setZoom(state.view.scale / 1.25));
      zoomInButton.addEventListener("click", () => setZoom(state.view.scale * 1.25));
      fitButton.addEventListener("click", () => {
        resetView();
        render();
      });
      actualSizeButton.addEventListener("click", () => {
        if (!state.image || !state.fitScale) return;
        setZoom(1 / state.fitScale);
      });

      [gtInput, upperInput, lowerInput, apexInput].forEach((input) => input.addEventListener("input", render));

      copyButton.addEventListener("click", async () => {
        await navigator.clipboard.writeText(jsonOutput.value);
        copyButton.textContent = "已复制";
        setTimeout(() => {
          copyButton.textContent = "复制 JSON";
        }, 900);
      });

      downloadButton.addEventListener("click", async () => {
        const filename = `${stem(state.imageName || "annotation")}.json`;
        if (window.showSaveFilePicker) {
          const handle = await window.showSaveFilePicker({
            suggestedName: filename,
            types: [{ description: "JSON", accept: { "application/json": [".json"] } }],
          });
          const writable = await handle.createWritable();
          await writable.write(jsonOutput.value);
          await writable.close();
          return;
        }
        const blob = new Blob([jsonOutput.value], { type: "application/json" });
        const link = document.createElement("a");
        link.download = filename;
        link.href = URL.createObjectURL(blob);
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(link.href);
      });

      function stem(filename) {
        return filename.replace(/\.[^.]+$/, "");
      }

      function readFileAsDataUrl(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = () => reject(reader.error);
          reader.readAsDataURL(file);
        });
      }

      function loadImage(src) {
        return new Promise((resolve, reject) => {
          const image = new Image();
          image.onload = () => resolve(image);
          image.onerror = () => reject(new Error("无法读取图像"));
          image.src = src;
        });
      }

      render();
    </script>
  </body>
</html>
